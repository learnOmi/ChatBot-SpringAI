# ===========================================
# AI 配置 - 开发环境
# ===========================================

spring:
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        options:
          model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:llama3.1:8b}
          temperature: 0.7
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        initialize-schema: true
