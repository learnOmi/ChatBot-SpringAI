management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    distribution:
      percentiles-histogram[http.server.requests]: true
      percentiles-histogram[spring.ai.chat.client.requests]: true
      slo[http.server.requests]: 100ms, 250ms, 500ms, 1s, 2s
      slo[spring.ai.chat.client.requests]: 2s,5s,10s,20s,30s
  tracing:
    sampling:
      probability: 1.0
    zipkin:
      endpoint: http://localhost:9411/api/v2/spans
  prometheus:
    metrics:
      export:
        enabled: true