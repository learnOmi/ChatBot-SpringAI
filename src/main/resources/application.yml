# Spring应用程序配置
spring:
  application:
    # 应用名称
    name: SpringAIRobot
  # 数据源配置
  datasource:
    # PostgreSQL数据库连接URL
    url: jdbc:postgresql://localhost:5432/vectordb
    # 数据库用户名
    username: postgres
    # 数据库密码
    password: postgres
    # JDBC驱动类名
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect # 指定数据库方言为 PostgreSQL
    hibernate:
      ddl-auto: update # 自动更新数据库表结构（生产环境建议使用 validate 或 none）
    show-sql: true # 在控制台打印执行的 SQL 语句（开发调试用）
    properties:
      hibernate:
        format_sql: false # 格式化打印的 SQL 语句
  # AI服务配置
  ai:
    # Ollama AI服务配置
    ollama:
      # Ollama服务基础URL
      base-url: http://localhost:11434
      # 嵌入模型配置
      embedding:
        options:
          # 使用的嵌入模型名称; 必须预先pull
          model: nomic-embed-text
      # 聊天模型配置
      chat:
        options:
          # 使用的聊天模型名称
          model: llama3.1:8b
          # 温度参数，控制输出的随机性
          temperature: 0.7
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    # 向量存储配置
    vectorstore:
      pgvector:
        # 索引类型，HNSW（Hierarchical Navigable Small World）是一种高效的近似最近邻搜索算法
        index-type: HNSW
        # 距离类型，余弦距离用于计算向量之间的相似度
        distance-type: COSINE_DISTANCE
        # 向量维度，取决于使用的嵌入模型
        dimensions: 768
        initialize-schema: true   # 自动建表（有时不生效，可手动）

# Spring Boot Actuator管理端点配置
management:
  # 端点配置
  endpoints:
    web:
      exposure:
        # 暴露 prometheus 和 health 端点，用于监控和健康检查
        include: health,prometheus
  # 指标配置
  metrics:
    distribution:
      # 配置百分比分布和SLO（服务等级目标），用于更精细的耗时监控
      percentiles-histogram[http.server.requests]: true
      percentiles-histogram[spring.ai.chat.client.requests]: true
      # HTTP请求的SLO阈值
      slo[http.server.requests]: 100ms, 250ms, 500ms, 1s, 2s
      # AI聊天客户端请求的SLO阈值
      slo[spring.ai.chat.client.requests]: 2s,5s,10s,20s,30s
  # 链路追踪配置
  tracing:
    sampling:
      probability: 1.0  # 采样率100%，生产环境可按需调整
    zipkin:
      endpoint: http://localhost:9411/api/v2/spans # Zipkin 服务地址，用于收集和展示追踪数据
  # Prometheus监控配置
  prometheus:
    metrics:
      export:
        enabled: true # 启用 Prometheus 指标导出，允许Prometheus服务器拉取指标数据

resilience4j:
  retry:
    instances:
      weather:
        max-attempts: 3                # 最多重试3次（含首次）
        wait-duration: 1s              # 重试间隔1秒
        retry-exceptions:
          - java.net.SocketTimeoutException
          - java.io.IOException
        ignore-exceptions:
          - java.lang.IllegalArgumentException  # 参数错误不重试
      search:
        max-attempts: 2
        wait-duration: 2s
  circuitbreaker:
    instances:
      weather:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10        # 统计最近10次调用
        failure-rate-threshold: 50     # 失败率超过50%时打开断路器
        wait-duration-in-open-state: 30s  # 断路器打开后30秒进入半开状态
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      search:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 60s
  timelimiter:
    instances:
      weather:
        timeout-duration: 5s           # 天气查询超时5秒
      search:
        timeout-duration: 10s          # 搜索超时10秒
  ratelimiter:
    instances:
      weather:
        limit-for-period: 10           # 每个周期最多10次
        limit-refresh-period: 1s       # 周期为1秒（即每秒最多10次）
        timeout-duration: 500ms        # 获取许可的等待时间

logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
    org.springframework.ai.chat.service: DEBUG
    org.springframework.ai.observation: DEBUG

app:
  upload:
    dir: C:\Users\Administrator\Pictures

agent:
  weather:
    # 和风天气API配置
    qweather:
      api-url: https://my6r6yt68m.re.qweatherapi.com/v7/weather/now
      geo-api-url: https://my6r6yt68m.re.qweatherapi.com/geo/v2/city/lookup
  search:
    brave-api-url: https://api.search.brave.com/res/v1/web/search
